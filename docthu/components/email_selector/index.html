<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  color: #1e293b;
  background: transparent;
}

/* ── Email display ─────────────────────────────────────────────────── */
#email-container {
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 20px 24px;
  background: #fff;
  overflow: auto;
  line-height: 1.65;
  cursor: text;
  user-select: text;
}

#email-container pre {
  white-space: pre-wrap;
  font-family: inherit;
  font-size: 13px;
  line-height: 1.7;
}

/* Highlighted {{ }} tokens */
.var-token {
  background: #fef08a;
  border: 1px solid #fde047;
  border-radius: 4px;
  padding: 1px 4px;
  font-family: ui-monospace, 'Cascadia Code', monospace;
  font-size: 0.85em;
  color: #854d0e;
  cursor: default;
  white-space: nowrap;
  user-select: none;
}

/* ── Floating "Add Variable" button ────────────────────────────────── */
#add-btn {
  position: fixed;
  display: none;
  align-items: center;
  gap: 5px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(37, 99, 235, 0.45);
  z-index: 100;
  white-space: nowrap;
  letter-spacing: 0.01em;
  transition: background 0.12s;
}
#add-btn:hover { background: #1d4ed8; }
#add-btn svg { flex-shrink: 0; }

/* ── Modal overlay ──────────────────────────────────────────────────── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.35);
  backdrop-filter: blur(2px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
#overlay.open { display: flex; }

/* ── Modal card ─────────────────────────────────────────────────────── */
#modal {
  background: #fff;
  border-radius: 14px;
  padding: 22px 24px 20px;
  width: 340px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
  animation: pop-in 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes pop-in {
  from { transform: scale(0.9); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

#modal h3 {
  font-size: 15px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 6px;
}

#selection-chip {
  display: inline-block;
  max-width: 100%;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 4px 9px;
  font-family: ui-monospace, monospace;
  font-size: 12px;
  color: #475569;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 16px;
}

#modal label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}

#modal input,
#modal select {
  display: block;
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid #e2e8f0;
  border-radius: 7px;
  font-size: 13px;
  color: #0f172a;
  background: #fff;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  margin-bottom: 12px;
}
#modal input:focus,
#modal select:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
}
#modal input.err { border-color: #ef4444; }

.field-hint {
  font-size: 11px;
  color: #94a3b8;
  margin-top: -10px;
  margin-bottom: 12px;
}
.field-hint.error-hint { color: #ef4444; display: none; }
.field-hint.error-hint.show { display: block; }

.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.modal-btns button {
  flex: 1;
  padding: 9px;
  border-radius: 7px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.12s, opacity 0.12s;
}
#btn-confirm { background: #2563eb; color: #fff; }
#btn-confirm:hover { background: #1d4ed8; }
#btn-cancel  { background: #f1f5f9; color: #475569; }
#btn-cancel:hover  { background: #e2e8f0; }
</style>
</head>
<body>

<div id="email-container"></div>

<!-- Floating selection button -->
<button id="add-btn">
  <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
    <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
  Add Variable
</button>

<!-- Modal -->
<div id="overlay">
  <div id="modal">
    <h3>Add Variable</h3>
    <div id="selection-chip"></div>

    <label for="inp-name">Variable name</label>
    <input id="inp-name" type="text" placeholder="e.g. sender.account_number"
           autocomplete="off" spellcheck="false" />
    <p class="field-hint error-hint" id="err-name">Name is required</p>

    <label for="inp-type">Type</label>
    <select id="inp-type">
      <option value="str">str — text (default)</option>
      <option value="int">int — integer number</option>
      <option value="float">float — decimal number</option>
      <option value="date">date — e.g. 22/03/2026</option>
      <option value="datetime">datetime — date + time</option>
    </select>

    <div class="modal-btns">
      <button id="btn-confirm">Add Variable</button>
      <button id="btn-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Streamlit component protocol ────────────────────────────────────────────
function post(msg) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, msg), '*');
}
function setValue(value) {
  post({ type: 'streamlit:setComponentValue', value, dataType: 'json' });
}
function sendHeight() {
  const h = document.getElementById('email-container').scrollHeight + 16;
  post({ type: 'streamlit:setFrameHeight', height: Math.max(h, 200) });
}

// Signal ready
post({ type: 'streamlit:componentReady', apiVersion: 1 });

window.addEventListener('message', function (e) {
  if (e.data && e.data.type === 'streamlit:render') {
    render(e.data.args || {});
    setTimeout(sendHeight, 80);
  }
});

// ── Rendering ───────────────────────────────────────────────────────────────
const VAR_RE = /(\{\{[^}]*\}\}|\{%[^%]*%\})/g;

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightTokens(root) {
  // Walk text nodes; wrap {{ }} patterns in <mark class="var-token">
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: n => n.parentElement.closest('.var-token') ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT
  });
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);

  for (const tn of nodes) {
    const txt = tn.nodeValue;
    VAR_RE.lastIndex = 0;
    if (!VAR_RE.test(txt)) continue;
    VAR_RE.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = VAR_RE.exec(txt)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(txt.slice(last, m.index)));
      const mark = document.createElement('mark');
      mark.className = 'var-token';
      mark.textContent = m[1];
      frag.appendChild(mark);
      last = m.index + m[1].length;
    }
    if (last < txt.length) frag.appendChild(document.createTextNode(txt.slice(last)));
    tn.parentNode.replaceChild(frag, tn);
  }
}

function render({ content, is_html, height }) {
  const container = document.getElementById('email-container');
  if (height) container.style.minHeight = height + 'px';

  if (is_html) {
    container.innerHTML = content || '';
  } else {
    container.innerHTML = '<pre>' + escHtml(content || '') + '</pre>';
  }
  highlightTokens(container);
}

// ── Selection UX ────────────────────────────────────────────────────────────
let pendingText = '';

const addBtn  = document.getElementById('add-btn');
const overlay = document.getElementById('overlay');
const inpName = document.getElementById('inp-name');
const inpType = document.getElementById('inp-type');
const errName = document.getElementById('err-name');

document.addEventListener('mouseup', function (e) {
  if (overlay.classList.contains('open')) return;
  if (addBtn.contains(e.target)) return;

  const sel  = window.getSelection();
  const text = sel ? sel.toString().trim() : '';

  if (text.length === 0) {
    addBtn.style.display = 'none';
    return;
  }

  pendingText = text;
  const rect = sel.getRangeAt(0).getBoundingClientRect();

  addBtn.style.display = 'flex';
  // Centre horizontally above the selection; clamp to viewport
  const btnW = 130;
  const left = Math.max(4, Math.min(rect.left + rect.width / 2 - btnW / 2, window.innerWidth - btnW - 4));
  addBtn.style.top  = Math.max(4, rect.top - 38) + 'px';
  addBtn.style.left = left + 'px';
});

// Keep selection alive when button is pressed
addBtn.addEventListener('mousedown', e => e.preventDefault());

addBtn.addEventListener('click', function () {
  addBtn.style.display = 'none';

  const chip = document.getElementById('selection-chip');
  chip.textContent = pendingText.length > 55
    ? pendingText.slice(0, 55) + '\u2026'
    : pendingText;

  inpName.value = '';
  inpType.value = 'str';
  inpName.classList.remove('err');
  errName.classList.remove('show');

  overlay.classList.add('open');
  setTimeout(() => inpName.focus(), 60);
});

overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-confirm').addEventListener('click', confirmAdd);

inpName.addEventListener('keydown', function (e) {
  if (e.key === 'Enter')  { e.preventDefault(); confirmAdd(); }
  if (e.key === 'Escape') closeModal();
});

function closeModal() {
  overlay.classList.remove('open');
  window.getSelection().removeAllRanges();
  pendingText = '';
}

function confirmAdd() {
  const name = inpName.value.trim();
  if (!name) {
    inpName.classList.add('err');
    errName.classList.add('show');
    inpName.focus();
    return;
  }
  setValue({ _id: Date.now(), text: pendingText, name, type: inpType.value });
  closeModal();
}
</script>
</body>
</html>
